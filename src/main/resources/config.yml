
prefix: "&7[&6GunGame&7] &r"

auto-join: true

arena-rotate:
    enabled: true
    interval: 300 # in seconds

database:
    host: "localhost"
    port: 3306
    name: "gungame_db"
    user: "root"
    password: "password123"
    useSSL: false

# Variables:
#  {map}, {kills}, {deaths}, {level}, {killstreak}
#  {coins}, {xp}, {event}, {players}, {stage}, {maptime}

scoreboard:
    enabled: true
    title: "&b&l✦  &e&lGunGame  &b&l✦"
    lines:
        - "&7Map: &e{map}"
        - "&7Kills: &e{kills}"
        - "&7Deaths: &e{deaths}"
        - "&7Level: &e{level}"
        - "&7Stage: &e{stage}"
        - "&7Kill Streak: &e{killstreak}"

shop:
    enabled: true

    upgrades-price:
        double_upgrade:
            1: 1000
            2: 1500
            3: 2000
            4: 2500
            5: 3000

    items:
        kill-effects:
            name: "&aKill Effects"
            lore:
                - "&7Click to browse."
        upgrades:
            name: "&aBuy Upgrades"
            lore:
                - "&7Click to browse."

        speed:
            name: "&aBuy Speed I"
            price: 800
            duration: 180
            lore:
                - " "
                - "&fCena: &e800 $"
                - "&fDobra trvání: &e3 minuty"
                - " "
                - "&aKlikni pro nákup."

        snowball:
            name: "&aBuy Snowball (1x)"
            price: 300
            lore:
                - " "
                - "&fCena: &e300 $"
                -
